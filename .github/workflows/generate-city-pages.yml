name: Generate City Pages

on:
  push:
    branches:
      - main
    paths:
      - scripts/generate_city_pages.py
      - templates/landing_template.html
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate landing pages
        run: python scripts/generate_city_pages.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html sitemap.xml
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "chore: regenerate city landing pages"
            git push
          fi